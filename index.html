<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <!--
    viewport-fit=cover: App läuft hinter Dynamic Island und Home Indicator
    initial-scale=1.0, maximum-scale=1.0: Kein ungewolltes Zoomen
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <!-- PWA / Theme -->
  <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- iOS Vollbild (kein Safari-UI wenn als PWA gestartet) -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <!--
    black-translucent: Status Bar (Dynamic Island Bereich) wird transparent.
    Die App füllt den gesamten Bildschirm — safe-area-inset-top behandelt den Abstand.
  -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="LagerApp" />
  <meta name="apple-touch-fullscreen" content="yes" />
  <meta name="format-detection" content="telephone=no" />

  <!-- App Icons -->
  <!-- iPhone 16 Pro / Pro Max braucht 180x180 -->
  <link rel="apple-touch-icon" href="/icons/icon-180.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png" />
  <link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-180.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />

  <!--
    iOS Splash Screens — werden beim App-Start kurz gezeigt.
    iPhone 16 Pro:      393×852pt @ 3x  → 1179×2556px
    iPhone 16 Pro Max:  430×932pt @ 3x  → 1290×2796px
    iPhone 16 / 16 Plus (gleiche Logik wie 15/14)
  -->

  <!-- iPhone 16 Pro Max -->
  <link rel="apple-touch-startup-image"
    media="screen and (device-width: 440px) and (device-height: 956px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
    href="/icons/splash-1320x2868.png" />

  <!-- iPhone 16 Pro -->
  <link rel="apple-touch-startup-image"
    media="screen and (device-width: 402px) and (device-height: 874px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
    href="/icons/splash-1206x2622.png" />

  <!-- iPhone 16 / 15 / 14 Pro Max (430×932) -->
  <link rel="apple-touch-startup-image"
    media="screen and (device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
    href="/icons/splash-1290x2796.png" />

  <!-- iPhone 16 Plus / 15 Plus / 14 Plus (428×926) -->
  <link rel="apple-touch-startup-image"
    media="screen and (device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
    href="/icons/splash-1284x2778.png" />

  <!-- iPhone 15 / 14 Pro (393×852) -->
  <link rel="apple-touch-startup-image"
    media="screen and (device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
    href="/icons/splash-1179x2556.png" />

  <!-- iPhone 14 / 13 / 12 (390×844) -->
  <link rel="apple-touch-startup-image"
    media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
    href="/icons/splash-1170x2532.png" />

  <!-- iPhone SE 3rd gen / 13 mini (375×812) -->
  <link rel="apple-touch-startup-image"
    media="screen and (device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
    href="/icons/splash-1125x2436.png" />

  <meta name="description" content="Professionelle Lagerverwaltung für mehrere Liegenschaften" />
  <title>LagerApp</title>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
